schema: spec-driven

context: |
  ## Project: EmuKC - KanColle Game Server Emulator

  ### Tech Stack
  - Rust 2024 edition, minimum toolchain 1.94.0
  - Axum (HTTP server), SeaORM + SQLite (database), Tokio (async runtime)
  - redb (resource cache key-value store)
  - async_trait for trait definitions

  ### Workspace Structure
  12 crates in a layered architecture. Dependencies flow strictly downward:
  - emukc (binary): CLI + HTTP server, contains KCSAPI route handlers
  - emukc_internal: unified facade re-exporting all library crates
  - emukc_gameplay: game logic as async traits with blanket impls
  - emukc_db: SeaORM entities + SQLite persistence (entity::user, entity::profile)
  - emukc_model: data models, KC API types, Codex (in-memory game manifest)
  - emukc_bootstrap: downloads and prepares game data files
  - emukc_cache: resource caching via redb
  - emukc_network: HTTP client for remote resources
  - emukc_crypto: hashing, token generation
  - emukc_time: time utilities
  - emukc_log: tracing setup
  - emukc_macros: procedural macros
  - emukc_app: runtime setup (mimalloc, stack size)

  ### Gameplay Trait System (emukc_gameplay)
  Each game domain defines an async trait (e.g., ShipOps, MaterialOps, SortieOps).
  All traits have blanket implementations for any type implementing HasContext,
  which provides access to DbConn and Codex. The top-level GameOps trait composes
  all 20+ domain traits.

  Internal gameplay functions are suffixed with _impl (e.g., add_ship_impl,
  deduct_material_impl) and take a generic C: ConnectionTrait parameter.
  This allows them to participate in database transactions and be reused
  across gameplay modules.

  ### Codex (emukc_model::codex::Codex)
  An in-memory read-only snapshot of all game manifest data (ship stats,
  equipment data, quest definitions, map definitions, etc.), loaded from
  .data/codex on disk at startup. It is the single source of truth for
  game configuration. The Codex never mutates after load.

  ### Database Entities
  SeaORM entities organized under:
  - entity::user (accounts, tokens) - account-level data
  - entity::profile (ships, items, quests, fleets, settings, etc.) - per-player game state

  ### API Response Format
  KanColle API responses use a "svdata=" JSON prefix. All KCSAPI handlers
  return KcApiResponse which wraps api_result (1=success, -1=failure),
  api_result_msg, and optional api_data. See src/bin/net/resp/kcs.rs.

  ### KCSAPI Route Structure
  Route directories under src/bin/net/router/kcsapi/ mirror the KanColle
  API URL structure: api_get_member/, api_port/, api_req_sortie/,
  api_req_map/, api_req_practice/, api_req_kousyou/, api_req_hokyu/,
  api_req_nyukyo/, api_req_quest/, api_req_battle_midnight/,
  api_req_furniture/, api_req_hensei/, api_req_init/, api_req_kaisou/,
  api_req_member/, api_req_mission/, api_req_ranking/, api_start2/

  ### Testing Conventions
  - Integration tests in tests/gameplay_tests/ test gameplay logic directly (no HTTP)
  - Handler-level tests use test_utils in each KCSAPI module with new_test_context()
  - Each test uses an independent in-memory database (new_mem_db())
  - Codex loaded from .data/codex on disk (requires prior bootstrap)

  ### Code Style
  - Hard tabs (see .rustfmt.toml)
  - unsafe_code denied workspace-wide
  - missing_docs warned
  - Pre-commit hooks expected

  ### Domain Terminology
  - profile: a player game instance (one account can have multiple profiles)
  - mst_id: manifest ID (references Codex data, not database instances)
  - deck/fleet: interchangeable terms for a group of up to 6 ships
  - sortie: a map excursion (start -> advance nodes -> battle -> result)
  - slot_item: equippable item (equipment/weapon)
  - kdock: construction dock (for building ships)
  - ndock: repair dock (for repairing ships)

rules:
  proposal:
    - Scope proposals to one capability when possible; cross-capability proposals are acceptable but must identify all affected specs
    - Include a "Non-goals" section explicitly
    - Reference existing gameplay traits by name (e.g., SortieOps, MaterialOps) and KCSAPI route groups
    - When proposing new gameplay features, identify which traits need new methods vs which need behavioral changes
  design:
    - Reference the specific crate path where changes occur (e.g., crates/emukc_gameplay/src/game/sortie.rs)
    - Distinguish between trait-level changes (new methods on XxxOps) and implementation-level changes (_impl function modifications)
    - For database changes, specify entity::user vs entity::profile scope
    - For API changes, specify the KCSAPI route group and handler file
    - If a design requires Codex data not currently loaded, note what new manifest fields are needed
  tasks:
    - Break tasks into chunks that map to the standard development flow: DB entity -> Model type -> Gameplay trait+impl -> KCSAPI handler
    - Each task should specify which crate(s) it touches
    - Mark tasks that require Codex changes separately (these need bootstrap updates)
    - Include test tasks: either tests/gameplay_tests/ for logic or inline handler tests for API
    - Max task duration should be under 2 hours of focused work
  specs:
    - Use WHEN/THEN scenarios to describe behavioral contracts, NOT Rust type signatures
    - Reference gameplay traits as the implementation boundary (e.g., "via MaterialOps")
    - Describe invariants that must hold across the domain (e.g., "materials never exceed caps")
    - Include error scenarios (what happens when preconditions are violated)
    - Avoid duplicating information already enforced by the Rust type system
    - Use domain terminology consistently (see context section)
    - Group scenarios by logical operation, not by trait method
    - Cross-reference other capabilities when behavior depends on them (e.g., quest progress updates triggered by sortie actions)
